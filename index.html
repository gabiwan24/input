<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Summa'Rizz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
        }
        textarea, input {
            background-color: #111111;
            border: 1px solid #333333;
            color: #ffffff;
            transition: border-color 0.2s;
        }
        textarea:focus, input:focus {
            outline: none;
            border-color: #666666;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4 font-sans">

    <div class="w-full max-w-2xl">
        <h1 class="text-3xl md:text-4xl font-light mb-8 text-center tracking-tight">
            Summa'Rizz
        </h1>

        <div class="space-y-6">
            <div class="space-y-4">
                <div>
                    <label for="password" class="block text-xs uppercase tracking-widest text-gray-500 mb-2">Zugangscode</label>
                    <input 
                        type="password" 
                        id="password" 
                        placeholder="Dein Passwort" 
                        class="w-full p-4 rounded-xl text-lg"
                    >
                </div>

                <div>
                    <label for="thema" class="block text-xs uppercase tracking-widest text-gray-500 mb-2">Thema</label>
                    <input 
                        type="text" 
                        id="thema" 
                        placeholder="Worum geht es?" 
                        class="w-full p-4 rounded-xl text-lg"
                    >
                </div>

                <div>
                    <label for="url" class="block text-xs uppercase tracking-widest text-gray-500 mb-2">URL (Link)</label>
                    <input 
                        type="url" 
                        id="url" 
                        placeholder="https://..." 
                        class="w-full p-4 rounded-xl text-lg"
                    >
                </div>

                <div>
                    <label for="message" class="block text-xs uppercase tracking-widest text-gray-500 mb-2">Deine Nachricht</label>
                    <textarea 
                        id="message" 
                        rows="6" 
                        class="w-full p-4 rounded-xl text-lg resize-none"
                        placeholder="Schreibe hier etwas oder kopiere einen Text hinein..."
                    ></textarea>
                </div>
            </div>

            <button 
                onclick="sendToN8N()" 
                id="sendBtn"
                class="w-full py-4 bg-white text-black font-bold rounded-xl hover:bg-gray-200 active:scale-[0.98] transition-all flex items-center justify-center gap-2"
            >
                <span>Senden</span>
                <svg id="spinner" class="hidden animate-spin h-5 w-5 text-black" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
            </button>

            <div id="status" class="text-center text-sm mt-4 min-h-[20px] font-medium"></div>
        </div>
    </div>

    <script>
        // Deine n8n Produktions-URL
        const WEBHOOK_URL = "https://n8n.kms-team.com/webhook/artikel-eingang";

        // Passwort-Speicherung initialisieren
        const passwordInput = document.getElementById('password');
        const savedPassword = localStorage.getItem('n8n_access_token');
        if (savedPassword) {
            passwordInput.value = savedPassword;
        }

        async function sendToN8N() {
            const password = passwordInput.value.trim();
            const thema = document.getElementById('thema').value.trim();
            const urlField = document.getElementById('url').value.trim();
            const message = document.getElementById('message').value.trim();
            
            if (!password) {
                showStatus('Bitte Zugangscode eingeben.', 'text-red-500');
                return;
            }
            if (!thema && !message && !urlField) {
                showStatus('Bitte fülle mindestens ein Feld aus.', 'text-yellow-500');
                return;
            }

            // Passwort merken
            localStorage.setItem('n8n_access_token', password);

            setLoading(true);
            showStatus('Verarbeite Artikel...', 'text-gray-400');

            try {
                const response = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Password': password 
                    },
                    body: JSON.stringify({
                        thema: thema,
                        url: urlField,
                        text: message,
                        timestamp: new Date().toISOString(),
                        source: 'Webmaske'
                    })
                });

                if (response.status === 401 || response.status === 403) {
                    showStatus('Falscher Zugangscode!', 'text-red-500');
                } else if (response.ok) {
                    showStatus('Erfolgreich gesendet! Die Analyse läuft.', 'text-green-400');
                    // Formular zurücksetzen
                    document.getElementById('thema').value = '';
                    document.getElementById('url').value = '';
                    document.getElementById('message').value = '';
                } else {
                    showStatus(`Fehler: ${response.status}`, 'text-red-500');
                }
            } catch (error) {
                showStatus(`Verbindung zu n8n fehlgeschlagen.`, 'text-red-500');
            } finally {
                setLoading(false);
            }
        }

        function setLoading(isLoading) {
            const btn = document.getElementById('sendBtn');
            const spinner = document.getElementById('spinner');
            btn.disabled = isLoading;
            btn.classList.toggle('opacity-50', isLoading);
            btn.classList.toggle('cursor-not-allowed', isLoading);
            spinner.classList.toggle('hidden', !isLoading);
        }

        function showStatus(text, colorClass) {
            const statusDiv = document.getElementById('status');
            statusDiv.textContent = text;
            statusDiv.className = `text-center text-sm mt-4 min-h-[20px] font-medium ${colorClass}`;
            
            if (colorClass.includes('green')) {
                setTimeout(() => {
                    if (statusDiv.textContent === text) statusDiv.textContent = '';
                }, 8000);
            }
        }
    </script>
</body>
</html>
