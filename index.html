<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dinge, über die man reden sollte...</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
        }
        textarea, input {
            background-color: #111111;
            border: 1px solid #333333;
            color: #ffffff;
            transition: border-color 0.2s;
        }
        textarea:focus, input:focus {
            outline: none;
            border-color: #666666;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4 font-sans">

    <div class="w-full max-w-2xl">
        <h1 class="text-3xl md:text-4xl font-light mb-8 text-center tracking-tight">
            Dinge, über die man reden sollte...
        </h1>

        <div class="space-y-6">
            <!-- n8n Config (Webhook URL) -->
            <div class="p-4 border border-zinc-800 rounded-xl bg-zinc-900/30">
                <label for="webhookUrl" class="block text-[10px] uppercase tracking-[0.2em] text-gray-500 mb-2 font-bold">n8n Webhook Endpoint</label>
                <input 
                    type="text" 
                    id="webhookUrl" 
                    placeholder="https://n8n.deine-instanz.de/webhook/..." 
                    class="w-full p-2 rounded-lg text-xs"
                >
            </div>

            <!-- Main Form -->
            <div class="space-y-4">
                <!-- Thema -->
                <div>
                    <label for="thema" class="block text-xs uppercase tracking-widest text-gray-500 mb-2">Thema</label>
                    <input 
                        type="text" 
                        id="thema" 
                        placeholder="Worum geht es?" 
                        class="w-full p-4 rounded-xl text-lg"
                    >
                </div>

                <!-- URL -->
                <div>
                    <label for="url" class="block text-xs uppercase tracking-widest text-gray-500 mb-2">URL (Link)</label>
                    <input 
                        type="url" 
                        id="url" 
                        placeholder="https://..." 
                        class="w-full p-4 rounded-xl text-lg"
                    >
                </div>

                <!-- Message -->
                <div>
                    <label for="message" class="block text-xs uppercase tracking-widest text-gray-500 mb-2">Deine Nachricht</label>
                    <textarea 
                        id="message" 
                        rows="6" 
                        class="w-full p-4 rounded-xl text-lg resize-none"
                        placeholder="Schreibe hier etwas..."
                    ></textarea>
                </div>
            </div>

            <!-- Send Button -->
            <button 
                onclick="sendToN8N()" 
                id="sendBtn"
                class="w-full py-4 bg-white text-black font-bold rounded-xl hover:bg-gray-200 active:scale-[0.98] transition-all flex items-center justify-center gap-2"
            >
                <span>Senden</span>
                <svg id="spinner" class="hidden animate-spin h-5 w-5 text-black" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
            </button>

            <!-- Status Message -->
            <div id="status" class="text-center text-sm mt-4 min-h-[20px] font-medium"></div>
        </div>
    </div>

    <script>
        // Webhook URL aus LocalStorage laden
        const webhookInput = document.getElementById('webhookUrl');
        const savedUrl = localStorage.getItem('n8n_webhook_url');
        if (savedUrl) {
            webhookInput.value = savedUrl;
        }

        // URL speichern wenn sie sich ändert
        webhookInput.addEventListener('change', (e) => {
            localStorage.setItem('n8n_webhook_url', e.target.value);
        });

        async function sendToN8N() {
            const webhookUrl = webhookInput.value.trim();
            const thema = document.getElementById('thema').value.trim();
            const urlField = document.getElementById('url').value.trim();
            const message = document.getElementById('message').value.trim();
            
            if (!webhookUrl) {
                showStatus('Bitte Webhook URL eingeben.', 'text-red-500');
                return;
            }
            if (!thema && !message) {
                showStatus('Bitte zumindest ein Thema oder eine Nachricht eingeben.', 'text-yellow-500');
                return;
            }

            setLoading(true);
            showStatus('', '');

            try {
                const response = await fetch(webhookUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        thema: thema,
                        url: urlField,
                        text: message,
                        timestamp: new Date().toISOString(),
                        source: 'Webmaske'
                    })
                });

                if (response.ok) {
                    showStatus('Erfolgreich gesendet!', 'text-green-400');
                    // Felder leeren
                    document.getElementById('thema').value = '';
                    document.getElementById('url').value = '';
                    document.getElementById('message').value = '';
                } else {
                    const errorText = await response.text();
                    showStatus(`Fehler: ${response.status}`, 'text-red-500');
                }
            } catch (error) {
                showStatus(`Netzwerkfehler: ${error.message}`, 'text-red-500');
            } finally {
                setLoading(false);
            }
        }

        function setLoading(isLoading) {
            const btn = document.getElementById('sendBtn');
            const spinner = document.getElementById('spinner');
            if (isLoading) {
                btn.disabled = true;
                btn.classList.add('opacity-50', 'cursor-not-allowed');
                spinner.classList.remove('hidden');
            } else {
                btn.disabled = false;
                btn.classList.remove('opacity-50', 'cursor-not-allowed');
                spinner.classList.add('hidden');
            }
        }

        function showStatus(text, colorClass) {
            const statusDiv = document.getElementById('status');
            statusDiv.textContent = text;
            statusDiv.className = `text-center text-sm mt-4 min-h-[20px] font-medium ${colorClass}`;
            
            if (colorClass.includes('green')) {
                setTimeout(() => {
                    if (statusDiv.textContent === text) statusDiv.textContent = '';
                }, 5000);
            }
        }
    </script>
</body>
</html>
